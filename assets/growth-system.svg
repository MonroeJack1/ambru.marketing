<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="Sistem de creștere marketing: trafic, conversie, retenție">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#242b38"/>
      <stop offset="1" stop-color="#12161e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7dfbd"/>
      <stop offset="1" stop-color="#f0b35a"/>
    </linearGradient>
  </defs>
  <rect width="980" height="520" rx="46" fill="url(#panel)"/>
  <g opacity=".22" stroke="#fff">
    <path d="M96 404C240 300 320 360 456 246s230-72 428-176" fill="none"/>
    <path d="M96 442C268 312 348 400 498 284s214-112 386-152" fill="none"/>
  </g>
  <g fill="rgba(255,255,255,.075)" stroke="rgba(255,255,255,.16)">
    <rect x="78" y="132" width="220" height="246" rx="30"/>
    <rect x="380" y="82" width="220" height="296" rx="30"/>
    <rect x="682" y="132" width="220" height="246" rx="30"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="118" y="192" fill="#f0b35a" font-size="22" font-weight="900">01</text>
    <text x="118" y="242" fill="#f4f1ea" font-size="34" font-weight="900">Trafic</text>
    <text x="118" y="286" fill="#b8b1a6" font-size="20">Atragi oameni relevanți</text>
    <text x="118" y="316" fill="#b8b1a6" font-size="20">prin campanii și conținut.</text>

    <text x="420" y="142" fill="#f0b35a" font-size="22" font-weight="900">02</text>
    <text x="420" y="192" fill="#f4f1ea" font-size="34" font-weight="900">Conversie</text>
    <text x="420" y="236" fill="#b8b1a6" font-size="20">Transformi atenția în</text>
    <text x="420" y="266" fill="#b8b1a6" font-size="20">leaduri și vânzări.</text>

    <text x="722" y="192" fill="#f0b35a" font-size="22" font-weight="900">03</text>
    <text x="722" y="242" fill="#f4f1ea" font-size="34" font-weight="900">Retenție</text>
    <text x="722" y="286" fill="#b8b1a6" font-size="20">Crești valoarea fiecărui</text>
    <text x="722" y="316" fill="#b8b1a6" font-size="20">client câștigat.</text>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M304 256h58"/>
    <path d="M342 224l32 32-32 32"/>
    <path d="M606 256h58"/>
    <path d="M644 224l32 32-32 32"/>
  </g>
  <g fill="url(#accent)">
    <circle cx="188" cy="364" r="8"/>
    <circle cx="490" cy="364" r="8"/>
    <circle cx="792" cy="364" r="8"/>
  </g>
</svg>
